<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Validators Clock</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="titlebar">
      <h1>VALIDATORS CLOCK</h1>
      <div class="header-updated">
        <span>Info updated</span>
        <strong id="metricFetched">-</strong>
      </div>
    </header>

    <main class="top-grid">
      <section class="info-panel election-panel" aria-label="Election details">
        <h2>Election</h2>
        <div class="status-display">
          <span id="metricStatus">-</span>
        </div>
        <div class="election-timing-groups">
          <section id="activeRoundWindowCard" class="election-time-card is-active-round">
            <div class="election-time-card-header">
              <h3>Active round window</h3>
              <div class="countdown-block">
                <span>Round ends in</span>
                <strong id="metricRoundEndsIn" class="election-countdown">-</strong>
              </div>
            </div>
            <div id="metricRound" class="date-stack election-date-stack">-</div>
          </section>

          <section class="election-time-card is-elections">
            <div class="election-time-card-header">
              <h3>Elections window</h3>
              <div class="countdown-block">
                <span>Elections start in</span>
                <strong id="metricElectionsStartIn" class="election-countdown">-</strong>
              </div>
            </div>
            <div id="metricElections" class="date-stack election-date-stack">-</div>
          </section>
        </div>
      </section>

      <section class="clock-stage" aria-label="Validator election clock">
        <svg id="clockSvg" viewBox="0 0 512 512" role="img" aria-labelledby="clockTitle">
          <title id="clockTitle">Validator election clock</title>
        </svg>
      </section>

      <section class="info-panel network-panel" aria-label="Network selector">
        <h2>Network</h2>
        <nav id="chainTabs" class="chain-tabs" aria-label="Chains"></nav>
        <dl>
          <div><dt>Chain</dt><dd id="metricChain">-</dd></div>
          <div><dt>RPC</dt><dd id="metricRpc">-</dd></div>
          <div><dt>Global ID</dt><dd id="metricGlobalId">-</dd></div>
          <div><dt>Seqno</dt><dd id="metricSeqno">-</dd></div>
        </dl>
      </section>
    </main>

    <section class="rounds-grid" aria-label="Validator rounds">
      <section class="round-panel round-blue">
        <div class="round-heading">
          <div class="round-title-block">
            <h2>Blue (Even) Round</h2>
            <p id="blueRoundMeta" class="round-meta">-</p>
          </div>
          <span id="blueRoundBadge" class="round-badge">-</span>
        </div>
        <div id="blueRoundStats" class="round-stats"></div>
        <div id="blueValidators" class="validator-list"></div>
      </section>

      <section class="round-panel round-green">
        <div class="round-heading">
          <div class="round-title-block">
            <h2>Green (Odd) Round</h2>
            <p id="greenRoundMeta" class="round-meta">-</p>
          </div>
          <span id="greenRoundBadge" class="round-badge">-</span>
        </div>
        <div id="greenRoundStats" class="round-stats"></div>
        <div id="greenValidators" class="validator-list"></div>
      </section>
    </section>

    <p id="errorBanner" class="error-banner" hidden></p>
  </div>
</body>
</html>
